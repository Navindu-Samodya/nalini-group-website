<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Order Management — Nalini Group Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="css/styles.css">
  <style>
    /* =============================================
       ADMIN PAGE — SCOPED STYLES
       ============================================= */
    body { background: var(--gray-light); }

    /* ---- Header ---- */
    .admin-hero {
      min-height: 140px;
      background: linear-gradient(140deg, #0f0c00 0%, #1e1900 100%);
      display: flex; align-items: center;
      padding-top: 68px; position: relative; overflow: hidden;
    }
    .admin-hero::after {
      content: ''; position: absolute;
      right: -60px; top: 50%; transform: translateY(-50%);
      width: 300px; height: 300px; border-radius: 50%;
      border: 1px solid rgba(201,165,32,0.2);
    }
    .admin-hero-inner {
      position: relative; z-index: 1;
      display: flex; align-items: center; justify-content: space-between;
      flex-wrap: wrap; gap: 16px;
    }
    .admin-hero-inner .tag {
      color: var(--gold); font-size: 0.75rem; font-weight: 600;
      letter-spacing: 4px; text-transform: uppercase; margin-bottom: 6px;
    }
    .admin-hero-inner h1 {
      font-family: var(--font-head);
      font-size: clamp(1.6rem, 3vw, 2.2rem); color: var(--white);
    }
    .refresh-btn {
      display: inline-flex; align-items: center; gap: 8px;
      background: rgba(201,165,32,0.2); color: var(--gold);
      border: 1px solid rgba(201,165,32,0.35);
      padding: 10px 20px; border-radius: var(--radius);
      font-size: 0.82rem; font-weight: 600; letter-spacing: 0.5px;
      transition: var(--ease);
    }
    .refresh-btn:hover { background: var(--gold); color: var(--navy); }

    /* ---- Layout ---- */
    .admin-main { padding: 32px 0 80px; }

    /* ---- Stat chips ---- */
    .stat-chips {
      display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 22px;
    }
    .stat-chip {
      background: var(--white); border: 1px solid var(--gray);
      border-radius: var(--radius); padding: 10px 18px;
      display: flex; align-items: center; gap: 9px;
      font-size: 0.83rem; color: var(--text-mid);
      box-shadow: var(--shadow-sm);
    }
    .stat-chip strong { color: var(--text-dark); font-weight: 700; }
    .stat-chip i { color: var(--gold); width: 14px; text-align: center; }

    /* ---- Page-level banner ---- */
    .page-banner {
      display: none; padding: 12px 18px; border-radius: var(--radius);
      font-size: 0.84rem; margin-bottom: 16px;
    }
    .page-banner.error   { display: block; background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
    .page-banner.success { display: block; background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }

    /* ---- Loading / empty ---- */
    .state-loading, .state-empty {
      text-align: center; padding: 72px 0; color: var(--text-light); font-size: 0.9rem;
    }
    .state-loading i { font-size: 1.8rem; color: var(--gold); display: block; margin-bottom: 12px; }
    .state-empty   i { font-size: 2.6rem; color: var(--gray); display: block; margin-bottom: 14px; }

    /* ---- Orders table ---- */
    .table-wrap {
      background: var(--white); border-radius: var(--radius-lg);
      box-shadow: var(--shadow-sm); border: 1px solid var(--gray); overflow: hidden;
    }
    .orders-table { width: 100%; border-collapse: collapse; font-size: 0.84rem; }
    .orders-table thead {
      background: linear-gradient(135deg, #0f0c00, #1e1900); color: var(--white);
    }
    .orders-table thead th {
      padding: 14px 16px; text-align: left;
      font-size: 0.7rem; font-weight: 600;
      letter-spacing: 0.8px; text-transform: uppercase; white-space: nowrap;
    }
    .orders-table tbody tr {
      border-bottom: 1px solid var(--gray-light); transition: background 0.15s ease;
    }
    .orders-table tbody tr:last-child { border-bottom: none; }
    .orders-table tbody tr:hover { background: var(--off-white); }
    .orders-table td { padding: 13px 16px; vertical-align: middle; color: var(--text-dark); }

    .td-order-num { font-weight: 700; color: var(--gold); font-size: 0.82rem; letter-spacing: 0.4px; }
    .td-name      { font-weight: 600; }
    .td-sub       { font-size: 0.75rem; color: var(--text-light); margin-top: 2px; }
    .td-total     { font-weight: 700; white-space: nowrap; }
    .td-date      { font-size: 0.78rem; color: var(--text-light); white-space: nowrap; }

    /* ---- Status badges ---- */
    .sbadge {
      display: inline-block; padding: 3px 10px; border-radius: 50px;
      font-size: 0.7rem; font-weight: 700; letter-spacing: 0.5px;
      text-transform: uppercase; white-space: nowrap; border: 1px solid transparent;
    }
    .sbadge-pending    { background: #fff3cd; color: #856404; border-color: #ffc107; }
    .sbadge-confirmed  { background: #cce5ff; color: #004085; border-color: #b8daff; }
    .sbadge-processing { background: #ffe8cc; color: #7d3e00; border-color: #e67e22; }
    .sbadge-completed  { background: #d4edda; color: #155724; border-color: #c3e6cb; }
    .sbadge-cancelled  { background: #f8d7da; color: #721c24; border-color: #f5c6cb; }

    .view-btn {
      padding: 6px 14px; border-radius: var(--radius);
      background: var(--gold); color: var(--navy);
      font-size: 0.78rem; font-weight: 600; transition: var(--ease);
      white-space: nowrap;
    }
    .view-btn:hover { background: var(--gold-light); }

    /* ---- Detail modal ---- */
    .admin-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.68); z-index: 3000;
      display: flex; align-items: flex-start; justify-content: center;
      padding: 48px 16px 24px; overflow-y: auto;
      opacity: 0; visibility: hidden; transition: var(--ease);
    }
    .admin-overlay.open { opacity: 1; visibility: visible; }

    .admin-modal {
      background: var(--white); border-radius: var(--radius-lg);
      width: 100%; max-width: 800px;
      box-shadow: var(--shadow-lg); flex-shrink: 0;
    }

    .amodal-head {
      display: flex; align-items: center; justify-content: space-between;
      padding: 20px 26px; border-radius: var(--radius-lg) var(--radius-lg) 0 0;
      background: linear-gradient(135deg, #0f0c00, #1e1900);
    }
    .amodal-head h2 { font-family: var(--font-head); font-size: 1.2rem; color: var(--white); }
    .amodal-head-num { color: var(--gold); font-size: 0.85rem; font-weight: 600; letter-spacing: 0.5px; margin-top: 2px; }
    .amodal-close {
      color: rgba(255,255,255,0.7); font-size: 1.2rem;
      width: 36px; height: 36px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      transition: var(--ease); flex-shrink: 0;
    }
    .amodal-close:hover { background: rgba(255,255,255,0.15); color: var(--white); }

    .amodal-body { padding: 26px; }

    /* Status update row */
    .status-update-row {
      display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
      padding: 14px 18px; background: var(--gray-light);
      border-radius: var(--radius); margin-bottom: 22px;
    }
    .status-update-row label {
      font-size: 0.75rem; font-weight: 700; color: var(--text-mid);
      text-transform: uppercase; letter-spacing: 0.5px;
    }
    .status-select {
      padding: 7px 12px; border: 1.5px solid var(--gray); border-radius: var(--radius);
      font-family: var(--font-body); font-size: 0.84rem; color: var(--text-dark);
      background: var(--white); outline: none; cursor: pointer; transition: var(--ease);
    }
    .status-select:focus { border-color: var(--gold); box-shadow: 0 0 0 3px rgba(201,165,32,0.15); }
    .status-update-btn {
      padding: 8px 18px; border-radius: var(--radius);
      background: var(--gold); color: var(--navy);
      font-size: 0.82rem; font-weight: 700; transition: var(--ease);
    }
    .status-update-btn:hover   { background: var(--gold-light); }
    .status-update-btn:disabled { opacity: 0.6; cursor: not-allowed; }
    .status-update-msg { font-size: 0.8rem; font-weight: 500; }
    .status-update-msg.ok  { color: var(--green); }
    .status-update-msg.err { color: var(--red); }

    /* Detail sections */
    .detail-section { margin-bottom: 22px; }
    .detail-section-label {
      font-size: 0.7rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: 1px; color: var(--text-light);
      margin-bottom: 12px; padding-bottom: 8px;
      border-bottom: 1px solid var(--gray-light);
      display: flex; align-items: center; gap: 7px;
    }
    .detail-section-label i { color: var(--gold); }

    .cust-grid {
      display: grid; grid-template-columns: repeat(auto-fit, minmax(190px, 1fr)); gap: 12px;
    }
    .cust-field label {
      display: block; font-size: 0.68rem; text-transform: uppercase;
      letter-spacing: 0.5px; color: var(--text-light); font-weight: 600; margin-bottom: 3px;
    }
    .cust-field span { font-size: 0.87rem; color: var(--text-dark); }

    .notes-box {
      background: var(--gray-light); border-radius: var(--radius);
      padding: 11px 15px; font-size: 0.85rem;
      color: var(--text-mid); font-style: italic;
    }
    .no-notes { font-size: 0.82rem; color: var(--text-light); }

    /* Items table */
    .items-table-wrap {
      border: 1px solid var(--gray); border-radius: var(--radius); overflow: hidden;
    }
    .items-table { width: 100%; border-collapse: collapse; font-size: 0.84rem; }
    .items-table th {
      background: var(--gray-light); text-align: left;
      padding: 9px 14px; font-size: 0.68rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.5px;
      color: var(--text-mid); border-bottom: 1px solid var(--gray);
    }
    .items-table td {
      padding: 11px 14px; border-bottom: 1px solid var(--gray-light);
      color: var(--text-dark); vertical-align: middle;
    }
    .items-table tr:last-child td { border-bottom: none; }
    .item-name  { font-weight: 500; margin-bottom: 3px; }
    .shop-tag {
      display: inline-block; font-size: 0.66rem; font-weight: 700;
      letter-spacing: 0.5px; text-transform: uppercase;
      color: var(--gold); background: rgba(201,165,32,0.12);
      border-radius: 50px; padding: 2px 8px;
    }
    .td-num { text-align: right; font-variant-numeric: tabular-nums; white-space: nowrap; }

    .items-total-row {
      display: flex; justify-content: flex-end; align-items: center; gap: 16px;
      padding: 13px 14px; border-top: 2px solid var(--gray);
      font-weight: 700;
    }
    .items-total-row .lbl { color: var(--text-mid); font-size: 0.88rem; }
    .items-total-row .amt { color: var(--gold); font-size: 1.1rem; }

    /* Modal loading / error states */
    .modal-state {
      text-align: center; padding: 56px 0;
      color: var(--text-light); font-size: 0.9rem;
    }
    .modal-state i    { font-size: 1.8rem; display: block; margin-bottom: 12px; }
    .modal-state.loading i { color: var(--gold); }
    .modal-state.error     { color: var(--red); }
    .modal-state.error i   { color: var(--red); }

    /* ---- Responsive ---- */
    @media (max-width: 768px) {
      .orders-table thead th:nth-child(3),
      .orders-table td:nth-child(3),
      .orders-table thead th:nth-child(4),
      .orders-table td:nth-child(4) { display: none; }

      .admin-overlay { padding: 8px; }
      .amodal-body { padding: 16px; }
      .cust-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

  <!-- ======== NAVBAR ======== -->
  <nav class="navbar">
    <div class="nav-container">
      <a href="index.html" class="nav-logo">NALINI<span class="logo-accent">GROUP</span></a>
      <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="studio.html">Studio</a></li>
        <li><a href="eshop.html">E-Shop</a></li>
        <li><a href="bookshop.html">Book Shop</a></li>
        <li><a href="admin.html" class="active">Admin</a></li>
      </ul>
      <div class="nav-actions">
        <button class="hamburger" id="hamburger" aria-label="Menu">
          <span></span><span></span><span></span>
        </button>
      </div>
    </div>
  </nav>

  <!-- ======== ADMIN HERO ======== -->
  <section class="admin-hero">
    <div class="container">
      <div class="admin-hero-inner">
        <div>
          <p class="tag">Internal</p>
          <h1>Order Management</h1>
        </div>
        <button class="refresh-btn" id="refreshBtn">
          <i class="fas fa-sync-alt"></i> Refresh
        </button>
      </div>
    </div>
  </section>

  <!-- ======== MAIN CONTENT ======== -->
  <main class="admin-main">
    <div class="container">

      <!-- Stat chips -->
      <div class="stat-chips" id="statChips"></div>

      <!-- Page-level error banner -->
      <div class="page-banner" id="pageBanner"></div>

      <!-- Loading state -->
      <div class="state-loading" id="stateLoading">
        <i class="fas fa-spinner fa-spin"></i>
        Loading orders&hellip;
      </div>

      <!-- Empty state -->
      <div class="state-empty" id="stateEmpty" style="display:none;">
        <i class="fas fa-inbox"></i>
        <p>No orders yet.</p>
        <small>Orders placed through the shops will appear here.</small>
      </div>

      <!-- Orders table -->
      <div class="table-wrap" id="tableWrap" style="display:none;">
        <table class="orders-table">
          <thead>
            <tr>
              <th>Order #</th>
              <th>Customer</th>
              <th>Phone</th>
              <th>Email</th>
              <th>Total</th>
              <th>Status</th>
              <th>Date</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="ordersBody"></tbody>
        </table>
      </div>

    </div>
  </main>

  <!-- ======== ORDER DETAIL MODAL ======== -->
  <div class="admin-overlay" id="adminOverlay">
    <div class="admin-modal" id="adminModal" role="dialog" aria-modal="true">

      <div class="amodal-head">
        <div>
          <h2>Order Detail</h2>
          <div class="amodal-head-num" id="modalOrderNum"></div>
        </div>
        <button class="amodal-close" id="modalCloseBtn" aria-label="Close">
          <i class="fas fa-times"></i>
        </button>
      </div>

      <div class="amodal-body" id="modalBody">
        <div class="modal-state loading">
          <i class="fas fa-spinner fa-spin"></i>
          Loading order&hellip;
        </div>
      </div>

    </div>
  </div>

  <!-- Minimal nav JS (no cart needed on admin page) -->
  <script>
    const ham  = document.getElementById('hamburger');
    const navL = document.querySelector('.nav-links');
    ham?.addEventListener('click', () => {
      ham.classList.toggle('open');
      navL.classList.toggle('open');
    });
    window.addEventListener('scroll', () => {
      document.querySelector('.navbar')?.classList.toggle('scrolled', window.scrollY > 8);
    });
  </script>
  <script src="js/admin.js"></script>
</body>
</html>
